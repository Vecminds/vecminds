<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Vecminds Technologies — Software & AI Engineering, Built to Scale
    </title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
    <style>
      /* TT Norms Pro substitute — Manrope is a close geometric-sans match */
      html,
      body {
        font-family:
          "Manrope",
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
      }
      * {
        font-family: inherit;
      }
      body {
        background: #f5f5f5;
        margin: 0;
      }
      html {
        scroll-behavior: smooth;
      }

      /* Hero brand marquee */
      @keyframes marquee {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }
      .marquee-track {
        display: flex;
        width: max-content;
        animation: marquee 22s linear infinite;
      }

      /* Backers marquee */
      @keyframes backers-marquee {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }
      .backers-track {
        display: flex;
        width: max-content;
        animation: backers-marquee 30s linear infinite;
      }

      /* Service card hover choreography */
      .svc-card {
        transition:
          transform 0.55s cubic-bezier(0.2, 0.7, 0.2, 1),
          box-shadow 0.5s ease,
          border-color 0.3s ease,
          background-color 0.4s ease;
      }
      .svc-card:hover {
        transform: translateY(-6px);
      }
      .svc-card-light:hover {
        border-color: rgba(0, 0, 0, 0.15);
        box-shadow: 0 24px 48px -22px rgba(43, 38, 68, 0.28);
      }
      .svc-card-dark:hover {
        box-shadow: 0 28px 60px -20px rgba(43, 38, 68, 0.55);
      }
      .svc-wash {
        opacity: 0;
        transition: opacity 0.5s ease;
      }
      .svc-card:hover .svc-wash {
        opacity: 1;
      }
      .svc-ghost {
        transition:
          transform 0.6s cubic-bezier(0.2, 0.7, 0.2, 1),
          opacity 0.5s ease;
      }
      .svc-card:hover .svc-ghost {
        transform: translate(-8px, -6px);
      }
      .svc-icon-wrap {
        transition:
          background-color 0.35s ease,
          transform 0.4s cubic-bezier(0.2, 0.7, 0.2, 1),
          color 0.35s ease;
      }
      .svc-card:hover .svc-icon-wrap {
        transform: rotate(-8deg) scale(1.06);
      }
      .svc-card-light:hover .svc-icon-wrap {
        background-color: #2754d9;
        color: #fff;
      }
      .svc-card-dark:hover .svc-icon-wrap {
        background-color: rgba(255, 255, 255, 0.18);
      }
      .svc-arrow {
        transition:
          background-color 0.3s ease,
          color 0.3s ease,
          transform 0.4s cubic-bezier(0.2, 0.7, 0.2, 1);
      }
      .svc-card:hover .svc-arrow {
        transform: translate(4px, -4px);
      }
      .svc-card-light:hover .svc-arrow {
        background-color: #2754d9;
        color: #fff;
      }
      .svc-card-dark:hover .svc-arrow {
        background-color: #fff;
        color: #2754d9;
      }

      /* Delivery model rows */
      .dm-row {
        transition: background-color 0.35s ease;
      }
      .dm-row:hover {
        background-color: #fafafa;
      }
      .dm-wash {
        opacity: 0;
        transition: opacity 0.45s ease;
      }
      .dm-row:hover .dm-wash {
        opacity: 1;
      }
      .dm-arrow {
        transition:
          background-color 0.3s ease,
          color 0.3s ease,
          transform 0.4s cubic-bezier(0.2, 0.7, 0.2, 1);
      }
      .dm-row:hover .dm-arrow {
        background-color: #2754d9;
        color: #fff;
        transform: translate(4px, -4px);
      }

      .svc-tag {
        transition:
          background-color 0.25s ease,
          transform 0.35s cubic-bezier(0.2, 0.7, 0.2, 1);
      }

      /* About cards minimal grid */
      .about-row {
        transition: background-color 0.35s ease;
      }
      .about-row:hover {
        background-color: rgba(255, 255, 255, 0.55);
      }
      @media (prefers-reduced-motion: reduce) {
        .about-row {
          transition: none;
        }
      }

      /* Team cards: flex accordion (lg+) — hovered card grows wider, others shrink; info panel slides up */
      .team-card {
        isolation: isolate;
        cursor: pointer;
        box-shadow:
          0 1px 2px rgba(43, 38, 68, 0.04),
          0 8px 24px -16px rgba(43, 38, 68, 0.18);
        transition: box-shadow 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      /* Soft inner gradient at the bottom of every card for legibility while the info panel is closed */
      .team-card::after {
        content: "";
        position: absolute;
        inset: auto 0 0 0;
        height: 40%;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.18), transparent);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s ease;
        z-index: 1;
      }
      @media (min-width: 1024px) {
        .team-card {
          flex: 1 1 0;
          transition:
            flex-grow 0.55s cubic-bezier(0.32, 0.72, 0.24, 1),
            box-shadow 0.5s ease;
        }
        .team-card.is-active {
          flex-grow: 2.4;
        }
        /* Only shrink the default-active card when ANOTHER specific card is hovered. */
        /* This avoids the gap-between-cards flicker where wrap:hover fired but no card was hovered. */
        .team-cards-wrap:has(.team-card:hover)
          .team-card.is-active:not(:hover) {
          flex-grow: 1;
        }
        .team-cards-wrap .team-card:hover,
        .team-cards-wrap .team-card:focus-visible {
          flex-grow: 2.4;
        }
      }
      .team-card:hover {
        box-shadow:
          0 2px 4px rgba(43, 38, 68, 0.05),
          0 24px 48px -20px rgba(43, 38, 68, 0.35);
      }

      /* Portrait area: subtle Ken-Burns zoom on hover/active */
      .team-portrait {
        transform: scale(1.001);
        transition: transform 1.2s cubic-bezier(0.2, 0.7, 0.2, 1);
        will-change: transform;
      }
      .team-card.is-active .team-portrait,
      .team-card:hover .team-portrait,
      .team-card:focus-visible .team-portrait {
        transform: scale(1.06);
      }
      .team-cards-wrap:has(.team-card:hover)
        .team-card.is-active:not(:hover)
        .team-portrait {
        transform: scale(1.001);
      }

      /* Sliding info panel */
      .team-card .team-info {
        transform: translateY(100%);
        transition: transform 0.6s cubic-bezier(0.32, 0.72, 0.24, 1);
        will-change: transform;
        z-index: 2;
        box-shadow: 0 -12px 24px -16px rgba(43, 38, 68, 0.18);
      }
      .team-card.is-active .team-info,
      .team-card:hover .team-info,
      .team-card:focus-visible .team-info {
        transform: translateY(0);
      }
      /* Retract default-active info panel only when another card is specifically hovered */
      .team-cards-wrap:has(.team-card:hover)
        .team-card.is-active:not(:hover)
        .team-info {
        transform: translateY(100%);
      }

      /* Staggered fade/lift for content inside the info panel */
      .team-info > * {
        opacity: 0;
        transform: translateY(8px);
        transition:
          opacity 0.45s ease,
          transform 0.55s cubic-bezier(0.2, 0.7, 0.2, 1);
      }
      .team-card.is-active .team-info > *,
      .team-card:hover .team-info > *,
      .team-card:focus-visible .team-info > * {
        opacity: 1;
        transform: translateY(0);
      }
      .team-card .team-info > *:nth-child(1) {
        transition-delay: 0.12s;
      }
      .team-card .team-info > *:nth-child(2) {
        transition-delay: 0.22s;
      }
      .team-cards-wrap:has(.team-card:hover)
        .team-card.is-active:not(:hover)
        .team-info
        > * {
        opacity: 0;
        transform: translateY(8px);
        transition-delay: 0s;
      }

      .team-card:focus-visible {
        outline: 2px solid #2754d9;
        outline-offset: 2px;
      }
      @media (prefers-reduced-motion: reduce) {
        .team-card,
        .team-card .team-info,
        .team-portrait,
        .team-info > * {
          transition: none !important;
        }
      }
      .svc-card:hover .svc-tag {
        transform: translateY(-1px);
      }
      .svc-card-light:hover .svc-tag {
        background-color: rgba(43, 38, 68, 0.08);
      }
      .svc-title {
        transition:
          letter-spacing 0.4s ease,
          color 0.3s ease;
      }
      .svc-card:hover .svc-title {
        letter-spacing: -0.025em;
      }

      /* ===== Mobile responsiveness =====*/
      /* Trim section vertical padding on small screens for better rhythm */
      @media (max-width: 767px) {
        section.py-24 {
          padding-top: 3.5rem !important;
          padding-bottom: 3.5rem !important;
        }
        section.py-20 {
          padding-top: 3rem !important;
          padding-bottom: 3rem !important;
        }
        section.py-16 {
          padding-top: 2.5rem !important;
          padding-bottom: 2.5rem !important;
        }
      }

      /* Mobile menu animation */
      @keyframes nav-slide-in {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .nav-mobile-panel {
        animation: nav-slide-in 0.25s ease-out both;
      }
      body.nav-open {
        overflow: hidden;
      }

      /* Disable card hover-lift on touch devices */
      @media (hover: none) {
        .svc-card:hover {
          transform: none;
        }
        .svc-card:hover .svc-ghost {
          transform: none;
        }
        .svc-card:hover .svc-icon-wrap {
          transform: none;
        }
        .svc-card:hover .svc-arrow {
          transform: none;
        }
        .svc-card:hover .svc-wash {
          opacity: 0;
        }
      }

      /* ===== Scroll reveal animations ===== */
      .reveal {
        opacity: 0;
        transform: translateY(28px);
        transition:
          opacity 0.85s ease,
          transform 0.85s cubic-bezier(0.2, 0.7, 0.2, 1);
        will-change: transform, opacity;
      }
      .reveal.is-visible {
        opacity: 1;
        transform: translateY(0);
      }
      @media (prefers-reduced-motion: reduce) {
        .reveal {
          opacity: 1 !important;
          transform: none !important;
          transition: none !important;
        }
      }

      /* ===== Marquee hover behavior (pause + per-item lift) ===== */
      .marquee-track:hover {
        animation-play-state: paused;
      }
      .marquee-track > span {
        transition:
          color 0.25s ease,
          transform 0.35s cubic-bezier(0.2, 0.7, 0.2, 1);
        cursor: default;
      }
      .marquee-track > span:hover {
        color: #0a0a0a !important;
        transform: translateY(-2px) scale(1.08);
      }

      /* ===== Generic card hover lifts ===== */
      .card-lift {
        transition:
          transform 0.45s cubic-bezier(0.2, 0.7, 0.2, 1),
          box-shadow 0.45s ease,
          border-color 0.3s ease;
      }
      @media (hover: hover) {
        .card-lift:hover {
          transform: translateY(-5px);
          box-shadow: 0 24px 48px -22px rgba(43, 38, 68, 0.28);
          border-color: rgba(0, 0, 0, 0.12);
        }
      }

      /* ===== Button shine on hover ===== */
      .btn-shine {
        position: relative;
        overflow: hidden;
        isolation: isolate;
      }
      .btn-shine::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          120deg,
          transparent 30%,
          rgba(255, 255, 255, 0.22) 50%,
          transparent 70%
        );
        transform: translateX(-120%);
        transition: transform 0.65s cubic-bezier(0.2, 0.7, 0.2, 1);
        pointer-events: none;
        z-index: 1;
      }
      .btn-shine:hover::after {
        transform: translateX(120%);
      }
      .btn-shine > * {
        position: relative;
        z-index: 2;
      }

      /* ===== Smart navbar ===== */
      .smart-nav {
        position: fixed;
        transition:
          transform 0.35s cubic-bezier(0.2, 0.7, 0.2, 1),
          background-color 0.3s ease,
          backdrop-filter 0.3s ease,
          box-shadow 0.3s ease,
          border-color 0.3s ease;
        border-bottom: 1px solid transparent;
      }
      .smart-nav.is-scrolled {
        background-color: rgba(245, 245, 245, 0.78);
        backdrop-filter: saturate(180%) blur(12px);
        -webkit-backdrop-filter: saturate(180%) blur(12px);
        border-bottom-color: rgba(0, 0, 0, 0.06);
        box-shadow: 0 6px 24px -18px rgba(43, 38, 68, 0.35);
      }
      .smart-nav.is-hidden {
        transform: translateY(-110%);
      }

      /* Info-section hover-expand row */
      .expand-row {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .expand-card {
        flex: 1 1 0;
        transition: flex 0.55s cubic-bezier(0.2, 0.7, 0.2, 1);
      }
      @media (min-width: 1024px) {
        .expand-row {
          flex-direction: row;
        }
        .expand-row:hover .expand-card {
          flex: 0.85 1 0;
        }
        .expand-row .expand-card:hover {
          flex: 2.2 1 0;
        }
      }
      .expand-card .expand-tail {
        opacity: 0;
        max-width: 0;
        transition:
          opacity 0.35s ease,
          max-width 0.55s cubic-bezier(0.2, 0.7, 0.2, 1);
        overflow: hidden;
      }
      @media (min-width: 1024px) {
        .expand-row .expand-card:hover .expand-tail {
          opacity: 1;
          max-width: 24rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
      const { useState } = React;

      // ============ Logo ============
      function LogoIcon({ className = "w-7 h-7" }) {
        return (
          <svg
            className={className}
            viewBox="0 0 256 256"
            fill="currentColor"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path d="M 128.005 191.173 C 128.448 156.208 156.93 128 192 128 L 192 64 L 128 64 C 128 99.346 99.346 128 64 128 L 64 192 L 128 192 Z M 192 256 L 64 256 C 28.654 256 0 227.346 0 192 L 0 64 L 64 64 L 64 0 L 192 0 C 227.346 0 256 28.654 256 64 L 256 192 L 192 192 Z" />
          </svg>
        );
      }

      // ============ Icons ============
      function ArrowRight({ className = "w-5 h-5" }) {
        return (
          <svg
            className={className}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
            aria-hidden="true"
          >
            <line x1="5" y1="12" x2="19" y2="12" />
            <polyline points="12 5 19 12 12 19" />
          </svg>
        );
      }

      // ============ Mobile Menu Icons ============
      function MenuIcon({ className = "w-5 h-5" }) {
        return (
          <svg
            className={className}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            aria-hidden="true"
          >
            <line x1="4" y1="7" x2="20" y2="7" />
            <line x1="4" y1="13" x2="20" y2="13" />
            <line x1="4" y1="19" x2="14" y2="19" />
          </svg>
        );
      }
      function CloseIcon({ className = "w-5 h-5" }) {
        return (
          <svg
            className={className}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            aria-hidden="true"
          >
            <line x1="5" y1="5" x2="19" y2="19" />
            <line x1="19" y1="5" x2="5" y2="19" />
          </svg>
        );
      }

      // ============ Navbar ============
      function Navbar() {
        const [open, setOpen] = useState(false);
        const [scrolled, setScrolled] = useState(false);
        const [hidden, setHidden] = useState(false);
        const lastY = React.useRef(0);

        const links = [
          { label: "Services", href: "#services" },
          { label: "Process", href: "#process" },
          { label: "Work", href: "#work" },
          { label: "Team", href: "#team" },
          { label: "About", href: "#about" },
        ];

        // Smart-sticky scroll behavior
        React.useEffect(() => {
          const onScroll = () => {
            const y = window.scrollY;
            setScrolled(y > 20);
            const delta = y - lastY.current;
            if (y < 80) {
              setHidden(false);
            } else if (delta > 6) {
              setHidden(true); // scrolling down
            } else if (delta < -6) {
              setHidden(false); // scrolling up
            }
            lastY.current = y;
          };
          window.addEventListener("scroll", onScroll, { passive: true });
          return () => window.removeEventListener("scroll", onScroll);
        }, []);

        // Lock body scroll when mobile menu is open + force-show nav
        React.useEffect(() => {
          if (open) {
            document.body.classList.add("nav-open");
            setHidden(false);
          } else {
            document.body.classList.remove("nav-open");
          }
          return () => document.body.classList.remove("nav-open");
        }, [open]);

        const closeMenu = () => setOpen(false);

        const navClass = [
          "smart-nav",
          "top-0 left-0 right-0 z-30 px-4 sm:px-6 py-4 sm:py-5",
          scrolled || open ? "is-scrolled" : "",
          hidden && !open ? "is-hidden" : "",
        ]
          .filter(Boolean)
          .join(" ");

        return (
          <nav className={navClass}>
            <div className="max-w-[88rem] mx-auto flex items-center justify-between gap-4">
              <a
                href="#"
                className="flex items-center text-black shrink-0"
                onClick={closeMenu}
              >
                <img
                  src="https://ik.imagekit.io/ishwors/vt/Vecminds_Full_Logo.png"
                  alt="Vecminds"
                  className="h-7 sm:h-8 w-auto"
                  style={{ height: "44px" }}
                />
              </a>

              <div className="hidden md:flex items-center gap-8">
                {links.map((l) => (
                  <a
                    key={l.label}
                    href={l.href}
                    className="relative text-base text-gray-700 hover:text-black font-medium transition-colors duration-200 group"
                  >
                    {l.label}
                    <span className="absolute left-0 right-0 -bottom-1 h-[2px] bg-black scale-x-0 group-hover:scale-x-100 origin-left transition-transform duration-300"></span>
                  </a>
                ))}
              </div>

              <div className="flex items-center gap-2 sm:gap-3">
                <a
                  href="#contact"
                  className="btn-shine hidden sm:inline-flex bg-black text-white text-sm sm:text-base font-medium px-5 sm:px-7 py-2.5 rounded-full hover:bg-gray-800 transition-all duration-200 hover:scale-[1.03]"
                >
                  Book a Call
                </a>

                <button
                  type="button"
                  aria-label={open ? "Close menu" : "Open menu"}
                  aria-expanded={open}
                  onClick={() => setOpen(!open)}
                  className="md:hidden w-11 h-11 rounded-full bg-black text-white flex items-center justify-center hover:bg-gray-800 transition-colors duration-200"
                >
                  {open ? (
                    <CloseIcon className="w-5 h-5" />
                  ) : (
                    <MenuIcon className="w-5 h-5" />
                  )}
                </button>
              </div>
            </div>

            {open && (
              <div className="md:hidden nav-mobile-panel mt-3 mx-1">
                <div className="bg-white rounded-2xl border border-black/10 shadow-[0_24px_48px_-20px_rgba(43,38,68,0.25)] p-2">
                  <ul className="flex flex-col">
                    {links.map((l, idx) => (
                      <li key={l.label}>
                        <a
                          href={l.href}
                          onClick={closeMenu}
                          className={`flex items-center justify-between px-5 py-4 text-black text-lg font-medium rounded-xl active:bg-black/[0.04] ${idx < links.length - 1 ? "border-b border-black/[0.06]" : ""}`}
                          style={{ letterSpacing: "-0.01em" }}
                        >
                          <span>{l.label}</span>
                          <ArrowRight className="w-4 h-4 text-black/40" />
                        </a>
                      </li>
                    ))}
                  </ul>
                  <a
                    href="#contact"
                    onClick={closeMenu}
                    className="btn-shine mt-2 mb-1 mx-1 inline-flex items-center justify-center gap-3 bg-black text-white text-base font-medium px-6 py-3.5 rounded-xl hover:bg-gray-800 transition-colors duration-200 w-[calc(100%-0.5rem)]"
                  >
                    Book a Call
                    <ArrowRight className="w-4 h-4" />
                  </a>
                </div>
              </div>
            )}
          </nav>
        );
      }

      // ============ Client Marquee (hero) ============
      const HERO_BRANDS = [
        {
          name: "Northwind",
          style: {
            fontFamily: "Georgia, serif",
            fontWeight: 700,
            letterSpacing: "-0.02em",
            fontSize: "15px",
          },
        },
        {
          name: "RELAYPAY",
          style: {
            fontFamily: "Arial, sans-serif",
            fontWeight: 900,
            letterSpacing: "0.08em",
            fontSize: "13px",
            textTransform: "uppercase",
          },
        },
        {

      // ============ App ============
      function App() {
        // Auto scroll-reveal: tag headings + cards + grid items + section paragraphs and observe them.
        React.useEffect(() => {
          const selectors = [
            "section h2",
            "section .grid > *",
            "section .expand-row > *",
            ".svc-card",
            "section > div > p",
            "section .max-w-\\[88rem\\] > div > p",
            "section .relative.rounded-3xl",
          ];

          const nodes = new Set();
          selectors.forEach((sel) => {
            try {
              document.querySelectorAll(sel).forEach((el) => {
                // Skip elements inside marquee tracks or the hero
                if (el.closest(".marquee-track")) return;
                if (
                  el.closest("section") &&
                  el.closest("section").querySelector("video")
                )
                  return;
                if (el.closest("nav")) return;
                nodes.add(el);
              });
            } catch (e) {
              /* ignore selector errors */
            }
          });
          nodes.forEach((el) => el.classList.add("reveal"));

          const io = new IntersectionObserver(
            (entries) => {
              entries.forEach((e) => {
                if (e.isIntersecting) {
                  // Stagger if part of a sibling group
                  const parent = e.target.parentElement;
                  if (parent && parent.children.length > 1) {
                    const idx = Array.prototype.indexOf.call(
                      parent.children,
                      e.target,
                    );
                    e.target.style.transitionDelay = `${Math.min(idx, 6) * 70}ms`;
                  }
                  e.target.classList.add("is-visible");
                  io.unobserve(e.target);
                }
              });
            },
            { threshold: 0.12, rootMargin: "0px 0px -8% 0px" },
          );
          nodes.forEach((el) => io.observe(el));
          return () => io.disconnect();
        }, []);

        return (
          <div className="flex flex-col bg-[#F5F5F5]">
            {/* Section 1: full-viewport hero container (desktop fixed-height, mobile auto) */}
            <div className="md:h-screen flex flex-col md:overflow-hidden relative">

            <AboutSection />
            <TeamSection />
            <FaqSection />
            <Footer />
          </div>
        );
      }
